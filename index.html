<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Redirect</title>

<style>
body{
  font-family: sans-serif;
  text-align:center;
  margin-top:20%;
}
#count{
  font-size:40px;
  color:red;
}
</style>

<script>
let time = 5;

function countdown(){
  document.getElementById("count").textContent = time;

  if(time === 0){
    location.href = "https://dorudo.pages.dev/page.html";
  } else {
    time--;
    setTimeout(countdown, 1000);
  }
}

window.onload = countdown;
</script>

</head>
